<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국민요양병원 비전 - 국민요양병원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;color:#222;line-height:1.6;background:#fff}
.page-wrap{max-width:1200px;margin:0 auto;padding:100px 24px 60px;}
/* 서브탭 */
.sub-tabs{display:flex;gap:0;border-bottom:2px solid #e8eef8;margin-bottom:2.5rem;}
.sub-tab{text-decoration:none;padding:14px 28px;font-size:15px;font-weight:600;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;}
.sub-tab:hover{color:#1a4b8c;}
.sub-tab.active{color:#1a4b8c;border-bottom-color:#1a4b8c;font-weight:800;}
/* 공통 카드 */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:2rem}
.card{background:#f8fbff;border-radius:16px;padding:28px 22px;border:1px solid #dde8f8}
.card .icon{font-size:32px;margin-bottom:12px}
.card h3{font-size:16px;font-weight:700;color:#1a4b8c;margin-bottom:8px}
.card p{font-size:14px;color:#5a7090;line-height:1.7}
.info-table{width:100%;border-collapse:collapse;margin-top:1.5rem}
.info-table th,.info-table td{padding:14px 18px;text-align:left;border-bottom:1px solid #e8eef8;font-size:15px}
.info-table th{background:#f4f8ff;color:#1a4b8c;font-weight:700;width:30%}
.step-list{display:flex;flex-direction:column;gap:0;margin-top:1.5rem}
.step{display:flex;gap:1.2rem;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;left:17px;top:42px;width:2px;height:calc(100% - 8px);background:linear-gradient(to bottom,#1a4b8c,#d0dff5)}
.step-num{width:36px;height:36px;min-width:36px;border-radius:50%;background:#1a4b8c;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;position:relative;z-index:1}
.step-body{padding-bottom:2rem}
.step-body h4{font-size:15px;font-weight:700;color:#1c2b3a;margin-bottom:4px;padding-top:6px}
.step-body p{font-size:14px;color:#5a7090;line-height:1.65}
footer{background:#0f2a55;color:rgba(255,255,255,.45);text-align:center;padding:2rem;font-size:13px;}
footer a{color:rgba(255,255,255,.45);text-decoration:none;}
@media(max-width:768px){nav{display:none}.card-grid{grid-template-columns:1fr}.sub-tabs{overflow-x:auto;}.sub-tab{white-space:nowrap;padding:12px 16px;font-size:14px;}}
</style>
</head>
